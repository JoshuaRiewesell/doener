
<style>
  html, body {
    margin: 0;
    padding: 0;
    min-height: 100%;
    height: 100%;
    background: var(--color-background-primary);
  }
  #toolbar { display: flex; flex-wrap: wrap; align-items: center; justify-content: center; gap: 10px; width: 100%; }
  #control-panel { position: fixed; left: 0; right: 0; bottom: 0; z-index: 900; background: rgba(255,255,255,0.95); backdrop-filter: blur(14px); border-top: 1px solid rgba(0,0,0,0.08); padding: 12px 10px 16px; box-sizing: border-box; }
  .color-swatch { width: 42px; height: 42px; border-radius: 50%; border: 3px solid transparent; cursor: pointer; transition: transform .15s, border-color .15s; flex-shrink: 0; }
  .color-swatch:hover { transform: scale(1.05); }
  .color-swatch.active { border-color: var(--color-text-primary); transform: scale(1.1); }
  #eraser { font-size: 20px; cursor: pointer; padding: 0; border-radius: 50%; border: 3px solid transparent; line-height: 1; display: flex; align-items: center; justify-content: center; width: 42px; height: 42px; }
  #eraser:hover, #eraser.active { border-color: var(--color-text-primary); background: var(--color-background-secondary); }
  #map-container { width: 100%; height: calc(100vh - 160px); overflow: hidden; background: var(--color-background-secondary); }
  #map-container svg { width: 100%; height: 100%; display: block; }
  #map-container svg path, #map-container svg polygon, #map-container svg circle {
    cursor: pointer; transition: opacity .1s;
  }
  #map-container svg path:hover, #map-container svg polygon:hover { opacity: 0.85; }
  #tooltip { position: fixed; background: var(--color-background-primary); border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); padding: 8px 12px; font-size: 14px; color: var(--color-text-secondary); pointer-events: none; display: none; z-index: 999; }
  #status { font-size: 14px; color: var(--color-text-secondary); width: 100%; text-align: center; margin-top: 8px; }
  #legend { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; justify-content: center; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--color-text-secondary); background: var(--color-background-secondary); border-radius: 999px; padding: 6px 10px; }
  .legend-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
  #toolbar button { border: none; border-radius: 999px; padding: 10px 14px; min-width: 96px; font-size: 14px; color: var(--color-text-primary); background: var(--color-background-secondary); cursor: pointer; transition: transform .1s, background .15s; }
  #toolbar button:hover { transform: translateY(-1px); background: var(--color-background-primary); }
  #loading { text-align: center; padding: 60px 20px; color: var(--color-text-secondary); font-size: 14px; }
  #error { text-align: center; padding: 40px 20px; color: var(--color-text-danger); font-size: 14px; }
  @media (max-width: 640px) {
    #map-container { height: calc(100vh - 190px); }
    #toolbar { gap: 8px; }
    .color-swatch, #eraser { width: 38px; height: 38px; }
    #toolbar button { min-width: 80px; padding: 10px 12px; font-size: 13px; }
  }
</style>

<h2 class="sr-only">Interaktive Berlin-Karte zum Einfärben von Stadtteilen</h2>

<div id="map-container">
  <div id="loading"><i class="ti ti-map-2" style="font-size:32px; display:block; margin-bottom:8px;" aria-hidden="true"></i>Karte wird geladen…</div>
</div>

<div id="control-panel">
  <div id="toolbar">
    <div id="eraser" class="active" title="Farbe entfernen" aria-label="Radierer">🧹</div>
  </div>
  <div id="status" aria-live="polite"></div>
  <div id="legend"></div>
</div>

<div id="tooltip"></div>

<script>
const COLORS = [
    { hex: '#8888FF', label: 'Jakob' },
    { hex: '#88FF88', label: 'Christoph' },
    { hex: '#FF8888', label: 'Joshua' },
];

let selectedColor = null;
const areaColors = {};
const undoStack = [];
const toolbar = document.getElementById('toolbar');
const legend = document.getElementById('legend');
const tooltip = document.getElementById('tooltip');
const status = document.getElementById('status');
const eraser = document.getElementById('eraser');

// --- Google Sheets / Apps Script webapp configuration ---
// Fill these blanks after you deploy the Apps Script web app (see apps_script.gs)
const SHEET_WEBAPP_URL = 'https://script.google.com/macros/s/AKfycbx-U2HQ82iKpcou6g_uBm-TTQZcBd83KNjEwVAmkyi_I0t9fSgiF1JotR_n5VB_2EaoiQ/exec'; // e.g. https://script.google.com/macros/s/XXX/exec
const SHEET_NAME = 'Colors'; // sheet/tab name used by the script (default "Colors")

COLORS.forEach(c => {
  const sw = document.createElement('div');
  sw.className = 'color-swatch';
  sw.style.background = c.hex;
  sw.title = c.label;
  sw.dataset.hex = c.hex;
  sw.dataset.label = c.label;
  sw.addEventListener('click', () => {
    selectedColor = c;
    document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
    eraser.classList.remove('active');
    sw.classList.add('active');
  });
  toolbar.appendChild(sw);
});

const undoBtn = document.createElement('button');
undoBtn.id = 'undo-btn';
undoBtn.textContent = 'Rückgängig';
undoBtn.style.fontSize = '12px';
undoBtn.style.cursor = 'pointer';
undoBtn.addEventListener('click', undoLastAction);
toolbar.appendChild(undoBtn);

const saveBtn = document.createElement('button');
saveBtn.id = 'save-btn';
saveBtn.textContent = 'Speichern';
saveBtn.style.fontSize = '12px';
saveBtn.style.cursor = 'pointer';
saveBtn.addEventListener('click', saveToSheet);
toolbar.appendChild(saveBtn);

eraser.addEventListener('click', () => {
  selectedColor = null;
  document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
  eraser.classList.add('active');
});

function getName(el) {
  const title = el.querySelector('title');
  if (title && title.textContent.trim()) return title.textContent.trim();
  if (el.id) return el.id.replace(/_/g, ' ');
  const parent = el.closest('g');
  if (parent) {
    const pt = parent.querySelector('title');
    if (pt && pt.textContent.trim()) return pt.textContent.trim();
    if (parent.id) return parent.id.replace(/_/g, ' ');
  }
  return null;
}

function updateLegend() {
  const colorMap = {};
  Object.entries(areaColors).forEach(([key, val]) => {
    if (!colorMap[val.hex]) colorMap[val.hex] = { label: val.label, names: [] };
    colorMap[val.hex].names.push(key);
  });
  legend.innerHTML = '';
  Object.entries(colorMap).forEach(([hex, info]) => {
    const item = document.createElement('div');
    item.className = 'legend-item';
    const dot = document.createElement('div');
    dot.className = 'legend-dot';
    dot.style.background = hex;
    const txt = document.createTextNode(info.label + ' (' + info.names.length + ')');
    item.appendChild(dot);
    item.appendChild(txt);
    legend.appendChild(item);
  });
}

function resetAll() {
  Object.keys(areaColors).forEach(k => delete areaColors[k]);
  document.querySelectorAll('#map-container [data-colored="1"]').forEach(el => {
    el.setAttribute('fill', el.dataset.origFill || '');
    delete el.dataset.colored;
  });
  updateLegend();
}

function makeClickable(paths) {
  paths.forEach(el => {
    if (!el.dataset.origFill) {
      el.dataset.origFill = el.getAttribute('fill') || '';
    }

    el.addEventListener('mouseenter', (e) => {
      const name = getName(el);
      if (name) {
        tooltip.textContent = name;
        tooltip.style.display = 'block';
      }
    });

    el.addEventListener('mousemove', (e) => {
      tooltip.style.left = (e.clientX + 12) + 'px';
      tooltip.style.top = (e.clientY - 28) + 'px';
    });

    el.addEventListener('mouseleave', () => {
      tooltip.style.display = 'none';
    });

    el.addEventListener('click', (e) => {
      e.stopPropagation();
      const polyId = el.dataset.polyId || '0';
      const previousState = {
        id: polyId,
        hex: el.getAttribute('fill') || '',
        colored: el.dataset.colored === '1',
        label: areaColors[polyId] ? areaColors[polyId].label : ''
      };
      undoStack.push(previousState);
      if (selectedColor) {
        el.setAttribute('fill', selectedColor.hex);
        el.dataset.colored = '1';
        areaColors[polyId] = { hex: selectedColor.hex, label: selectedColor.label };
      } else {
        el.setAttribute('fill', el.dataset.origFill || '');
        delete el.dataset.colored;
        delete areaColors[polyId];
      }
      updateLegend();
    });
  });
}

async function loadMap() {
  const url = 'https://upload.wikimedia.org/wikipedia/commons/c/c5/Berlin%2C_administrative_divisions_%28%2Bdistricts_%2Bboroughs_-pop%29_-_de_-_colored_%28less_colors%29.svg';
  try {
    const res = await fetch(url);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const text = await res.text();
    const container = document.getElementById('map-container');
    container.innerHTML = text;
    const svg = container.querySelector('svg');
    if (!svg) throw new Error('Kein SVG gefunden');
    svg.removeAttribute('width');
    svg.removeAttribute('height');
    svg.style.width = '100%';
    svg.style.height = 'auto';

    const clickable = svg.querySelectorAll('path, polygon');
    const interesting = Array.from(clickable).filter(el => {
      const fill = el.getAttribute('fill');
      const stroke = el.getAttribute('stroke');
      return fill && fill !== 'none' && fill !== '#ffffff' && fill !== 'white';
    });
    const clickablePaths = interesting.length > 5 ? interesting : Array.from(clickable);
    clickablePaths.forEach((el, index) => {
      el.dataset.polyId = String(index + 1);
    });

    makeClickable(clickablePaths);
  } catch(err) {
    document.getElementById('map-container').innerHTML =
      '<div id="error"><i class="ti ti-alert-triangle" style="font-size:32px; display:block; margin-bottom:8px;" aria-hidden="true"></i>Karte konnte nicht geladen werden.<br><small>' + err.message + '</small></div>';
  }
}

loadMap().then(loadFromSheet);

function setStatus(message) {
  if (!status) return;
  status.textContent = message;
  if (message) {
    status.style.display = 'block';
  } else {
    status.style.display = 'none';
  }
}

function undoLastAction() {
  if (undoStack.length === 0) {
    setStatus('Keine Aktion zum Rückgängig machen.');
    return;
  }
  const previousState = undoStack.pop();
  const el = document.querySelector('#map-container svg [data-poly-id="' + previousState.id + '"]');
  if (!el) {
    setStatus('Polygon nicht gefunden.');
    return;
  }
  if (previousState.colored) {
    el.setAttribute('fill', previousState.hex);
    el.dataset.colored = '1';
    areaColors[previousState.id] = { hex: previousState.hex, label: previousState.label };
  } else {
    el.setAttribute('fill', el.dataset.origFill || '');
    delete el.dataset.colored;
    delete areaColors[previousState.id];
  }
  updateLegend();
  setStatus('Letzte Aktion rückgängig gemacht.');
}

/* Google Sheets integration: save/load simple name→color mapping */
function loadFromSheet() {
  if (!SHEET_WEBAPP_URL || SHEET_WEBAPP_URL.includes('<<')) {
    setStatus('Bitte WEB_APP_URL in der Datei eintragen (SHEET_WEBAPP_URL).');
    return;
  }
  setStatus('Lade gespeicherte Farben…');
  const cb = 'doener_load_cb_' + Date.now();
  window[cb] = function (json) {
    try {
      const rows = Array.isArray(json.rows) ? json.rows : [];
      Object.keys(areaColors).forEach(k => delete areaColors[k]);
      document.querySelectorAll('#map-container [data-colored="1"]').forEach(el => {
        el.setAttribute('fill', el.dataset.origFill || '');
        delete el.dataset.colored;
      });
      rows.forEach(r => {
        if (!r.id) return;
        const sel = document.querySelector('#map-container svg [data-poly-id="' + r.id + '"]');
        if (sel && r.hex) {
          sel.setAttribute('fill', r.hex);
          sel.dataset.colored = '1';
          areaColors[r.id] = { hex: r.hex, label: r.label || '' };
        }
      });
      updateLegend();
      setStatus('Daten geladen.');
    } catch (err) {
      setStatus('Fehler beim Verarbeiten: ' + err.message);
    }
    // cleanup
    const s = document.getElementById(cb + '_script');
    if (s) s.remove();
    try { delete window[cb]; } catch (_) { window[cb] = undefined; }
  };
  const script = document.createElement('script');
  script.id = cb + '_script';
  script.src = SHEET_WEBAPP_URL + '?action=get&sheet=' + encodeURIComponent(SHEET_NAME) + '&callback=' + cb;
  document.head.appendChild(script);
  // timeout
  setTimeout(() => {
    if (window[cb]) {
      setStatus('Timeout beim Laden der Daten.');
      const s = document.getElementById(cb + '_script'); if (s) s.remove();
      try { delete window[cb]; } catch (_) { window[cb] = undefined; }
    }
  }, 15000);
}

function saveToSheet() {
  if (!SHEET_WEBAPP_URL || SHEET_WEBAPP_URL.includes('<<')) {
    setStatus('Bitte WEB_APP_URL in der Datei eintragen (SHEET_WEBAPP_URL).');
    return;
  }
  setStatus('Speichere Daten…');
  const rows = Object.entries(areaColors).map(([id, v]) => ({ id, hex: v.hex, label: v.label }));
  const payload = encodeURIComponent(JSON.stringify(rows));
  const cb = 'doener_save_cb_' + Date.now();
  window[cb] = function (resp) {
    try {
      if (resp && resp.status === 'ok') setStatus('Daten gespeichert.');
      else setStatus('Fehler beim Speichern: ' + (resp && resp.message ? resp.message : JSON.stringify(resp)));
    } catch (err) {
      setStatus('Fehler beim Speichern: ' + err.message);
    }
    const s = document.getElementById(cb + '_script'); if (s) s.remove();
    try { delete window[cb]; } catch (_) { window[cb] = undefined; }
  };
  const script = document.createElement('script');
  script.id = cb + '_script';
  script.src = SHEET_WEBAPP_URL + '?action=set&sheet=' + encodeURIComponent(SHEET_NAME) + '&rows=' + payload + '&callback=' + cb;
  document.head.appendChild(script);
  setTimeout(() => {
    if (window[cb]) {
      setStatus('Timeout beim Speichern.');
      const s = document.getElementById(cb + '_script'); if (s) s.remove();
      try { delete window[cb]; } catch (_) { window[cb] = undefined; }
    }
  }, 15000);
}
</script>
