
<style>
  #toolbar { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; padding: 10px 0 12px; }
  .color-swatch { width: 28px; height: 28px; border-radius: 50%; border: 2px solid transparent; cursor: pointer; transition: transform .15s, border-color .15s; flex-shrink: 0; }
  .color-swatch:hover { transform: scale(1.15); }
  .color-swatch.active { border-color: var(--color-text-primary); transform: scale(1.2); }
  #eraser { font-size: 18px; cursor: pointer; padding: 4px; border-radius: 50%; border: 2px solid transparent; line-height: 1; display: flex; align-items: center; justify-content: center; width: 28px; height: 28px; }
  #eraser:hover, #eraser.active { border-color: var(--color-text-primary); background: var(--color-background-secondary); }
  #map-container { width: 100%; border-radius: var(--border-radius-lg); overflow: hidden; background: var(--color-background-secondary); }
  #map-container svg { width: 100%; height: auto; display: block; }
  #map-container svg path, #map-container svg polygon, #map-container svg circle {
    cursor: pointer; transition: opacity .1s;
  }
  #map-container svg path:hover, #map-container svg polygon:hover { opacity: 0.8; }
  #tooltip { position: fixed; background: var(--color-background-primary); border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); padding: 5px 10px; font-size: 13px; color: var(--color-text-secondary); pointer-events: none; display: none; z-index: 999; }
  #status { font-size: 13px; color: var(--color-text-secondary); margin-left: 4px; }
  #legend { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; min-height: 24px; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--color-text-secondary); background: var(--color-background-secondary); border-radius: 99px; padding: 3px 10px 3px 6px; }
  .legend-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
  #reset-btn { margin-left: auto; font-size: 12px; color: var(--color-text-secondary); cursor: pointer; background: none; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); padding: 4px 10px; }
  #reset-btn:hover { background: var(--color-background-secondary); }
  #loading { text-align: center; padding: 60px 20px; color: var(--color-text-secondary); font-size: 14px; }
  #error { text-align: center; padding: 40px 20px; color: var(--color-text-danger); font-size: 14px; }
</style>

<h2 class="sr-only">Interaktive Berlin-Karte zum Einfärben von Stadtteilen</h2>

<div id="toolbar">
  <div id="eraser" class="active" title="Farbe entfernen" aria-label="Radierer">🧹</div>
  <div style="width:1px; height:20px; background: var(--color-border-secondary); margin: 0 2px;"></div>
</div>

<div id="map-container">
  <div id="loading"><i class="ti ti-map-2" style="font-size:32px; display:block; margin-bottom:8px;" aria-hidden="true"></i>Karte wird geladen…</div>
</div>

<div id="legend"></div>

<div id="tooltip"></div>

<script>
const COLORS = [
    { hex: '#8888FF', label: 'Jakob' },
    { hex: '#88FF88', label: 'Christoph' },
    { hex: '#FF8888', label: 'Joshua' },
];

let selectedColor = null;
const areaColors = {};
const toolbar = document.getElementById('toolbar');
const legend = document.getElementById('legend');
const tooltip = document.getElementById('tooltip');
const eraser = document.getElementById('eraser');

// --- Google Sheets / Apps Script webapp configuration ---
// Fill these blanks after you deploy the Apps Script web app (see apps_script.gs)
const SHEET_WEBAPP_URL = 'https://script.google.com/macros/s/AKfycbwvzXQmxnHpv47gtI8eX9ObSubzc6YY4HiYRt_h8ReecmCJg-2EodWELl6189R96wTdsw/exec'; // e.g. https://script.google.com/macros/s/XXX/exec
const SHEET_NAME = 'Colors'; // sheet/tab name used by the script (default "Colors")

COLORS.forEach(c => {
  const sw = document.createElement('div');
  sw.className = 'color-swatch';
  sw.style.background = c.hex;
  sw.title = c.label;
  sw.dataset.hex = c.hex;
  sw.dataset.label = c.label;
  sw.addEventListener('click', () => {
    selectedColor = c;
    document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
    eraser.classList.remove('active');
    sw.classList.add('active');
  });
  toolbar.appendChild(sw);
});

const resetBtn = document.createElement('button');
resetBtn.id = 'reset-btn';
resetBtn.textContent = 'Zurücksetzen';
resetBtn.addEventListener('click', resetAll);
toolbar.appendChild(resetBtn);

const loadBtn = document.createElement('button');
loadBtn.id = 'load-btn';
loadBtn.textContent = 'Laden';
loadBtn.style.fontSize = '12px';
loadBtn.style.cursor = 'pointer';
loadBtn.addEventListener('click', loadFromSheet);
toolbar.appendChild(loadBtn);

const saveBtn = document.createElement('button');
saveBtn.id = 'save-btn';
saveBtn.textContent = 'Speichern';
saveBtn.style.fontSize = '12px';
saveBtn.style.cursor = 'pointer';
saveBtn.addEventListener('click', saveToSheet);
toolbar.appendChild(saveBtn);

eraser.addEventListener('click', () => {
  selectedColor = null;
  document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
  eraser.classList.add('active');
});

function getName(el) {
  const title = el.querySelector('title');
  if (title && title.textContent.trim()) return title.textContent.trim();
  if (el.id) return el.id.replace(/_/g, ' ');
  const parent = el.closest('g');
  if (parent) {
    const pt = parent.querySelector('title');
    if (pt && pt.textContent.trim()) return pt.textContent.trim();
    if (parent.id) return parent.id.replace(/_/g, ' ');
  }
  return null;
}

function updateLegend() {
  const colorMap = {};
  Object.entries(areaColors).forEach(([key, val]) => {
    if (!colorMap[val.hex]) colorMap[val.hex] = { label: val.label, names: [] };
    colorMap[val.hex].names.push(key);
  });
  legend.innerHTML = '';
  Object.entries(colorMap).forEach(([hex, info]) => {
    const item = document.createElement('div');
    item.className = 'legend-item';
    const dot = document.createElement('div');
    dot.className = 'legend-dot';
    dot.style.background = hex;
    const txt = document.createTextNode(info.label + ' (' + info.names.length + ')');
    item.appendChild(dot);
    item.appendChild(txt);
    legend.appendChild(item);
  });
}

function resetAll() {
  Object.keys(areaColors).forEach(k => delete areaColors[k]);
  document.querySelectorAll('#map-container [data-colored="1"]').forEach(el => {
    el.setAttribute('fill', el.dataset.origFill || '');
    delete el.dataset.colored;
  });
  updateLegend();
}

function makeClickable(paths) {
  paths.forEach(el => {
    if (!el.dataset.origFill) {
      el.dataset.origFill = el.getAttribute('fill') || '';
    }

    el.addEventListener('mouseenter', (e) => {
      const name = getName(el);
      if (name) {
        tooltip.textContent = name;
        tooltip.style.display = 'block';
      }
    });

    el.addEventListener('mousemove', (e) => {
      tooltip.style.left = (e.clientX + 12) + 'px';
      tooltip.style.top = (e.clientY - 28) + 'px';
    });

    el.addEventListener('mouseleave', () => {
      tooltip.style.display = 'none';
    });

    el.addEventListener('click', (e) => {
      e.stopPropagation();
      const name = getName(el) || el.id || 'Bereich';
      if (selectedColor) {
        el.setAttribute('fill', selectedColor.hex);
        el.dataset.colored = '1';
        areaColors[name] = selectedColor;
      } else {
        el.setAttribute('fill', el.dataset.origFill || '');
        delete el.dataset.colored;
        delete areaColors[name];
      }
      updateLegend();
    });
  });
}

async function loadMap() {
  const url = 'https://upload.wikimedia.org/wikipedia/commons/c/c5/Berlin%2C_administrative_divisions_%28%2Bdistricts_%2Bboroughs_-pop%29_-_de_-_colored_%28less_colors%29.svg';
  try {
    const res = await fetch(url);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const text = await res.text();
    const container = document.getElementById('map-container');
    container.innerHTML = text;
    const svg = container.querySelector('svg');
    if (!svg) throw new Error('Kein SVG gefunden');
    svg.removeAttribute('width');
    svg.removeAttribute('height');
    svg.style.width = '100%';
    svg.style.height = 'auto';

    const clickable = svg.querySelectorAll('path, polygon');
    const interesting = Array.from(clickable).filter(el => {
      const fill = el.getAttribute('fill');
      const stroke = el.getAttribute('stroke');
      return fill && fill !== 'none' && fill !== '#ffffff' && fill !== 'white';
    });

    makeClickable(interesting.length > 5 ? interesting : Array.from(clickable));
  } catch(err) {
    document.getElementById('map-container').innerHTML =
      '<div id="error"><i class="ti ti-alert-triangle" style="font-size:32px; display:block; margin-bottom:8px;" aria-hidden="true"></i>Karte konnte nicht geladen werden.<br><small>' + err.message + '</small></div>';
  }
}

loadMap();

/* Google Sheets integration: save/load simple name→color mapping */
function loadFromSheet() {
  if (!SHEET_WEBAPP_URL || SHEET_WEBAPP_URL.includes('<<')) {
    alert('Bitte WEB_APP_URL in der Datei eintragen (SHEET_WEBAPP_URL).');
    return;
  }
  const cb = 'doener_load_cb_' + Date.now();
  window[cb] = function (json) {
    try {
      const rows = Array.isArray(json.rows) ? json.rows : [];
      Object.keys(areaColors).forEach(k => delete areaColors[k]);
      document.querySelectorAll('#map-container [data-colored="1"]').forEach(el => {
        el.setAttribute('fill', el.dataset.origFill || '');
        delete el.dataset.colored;
      });
      rows.forEach(r => {
        if (!r.name) return;
        const sel = Array.from(document.querySelectorAll('#map-container svg [id], #map-container svg path, #map-container svg polygon'))
          .find(el => {
            const n = (el.querySelector && el.querySelector('title') && el.querySelector('title').textContent) || el.id || '';
            return n && n.trim() === r.name;
          });
        if (sel && r.hex) {
          sel.setAttribute('fill', r.hex);
          sel.dataset.colored = '1';
          areaColors[r.name] = { hex: r.hex, label: r.label || '' };
        }
      });
      updateLegend();
      alert('Daten geladen.');
    } catch (err) {
      alert('Fehler beim Verarbeiten: ' + err.message);
    }
    // cleanup
    const s = document.getElementById(cb + '_script');
    if (s) s.remove();
    try { delete window[cb]; } catch (_) { window[cb] = undefined; }
  };
  const script = document.createElement('script');
  script.id = cb + '_script';
  script.src = SHEET_WEBAPP_URL + '?action=get&sheet=' + encodeURIComponent(SHEET_NAME) + '&callback=' + cb;
  document.head.appendChild(script);
  // timeout
  setTimeout(() => {
    if (window[cb]) {
      alert('Timeout beim Laden der Daten.');
      const s = document.getElementById(cb + '_script'); if (s) s.remove();
      try { delete window[cb]; } catch (_) { window[cb] = undefined; }
    }
  }, 15000);
}

function saveToSheet() {
  if (!SHEET_WEBAPP_URL || SHEET_WEBAPP_URL.includes('<<')) {
    alert('Bitte WEB_APP_URL in der Datei eintragen (SHEET_WEBAPP_URL).');
    return;
  }
  const rows = Object.entries(areaColors).map(([name, v]) => ({ name, hex: v.hex, label: v.label }));
  const payload = encodeURIComponent(JSON.stringify(rows));
  const cb = 'doener_save_cb_' + Date.now();
  window[cb] = function (resp) {
    try {
      if (resp && resp.status === 'ok') alert('Daten gespeichert.');
      else alert('Fehler beim Speichern: ' + (resp && resp.message ? resp.message : JSON.stringify(resp)));
    } catch (err) {
      alert('Fehler beim Speichern: ' + err.message);
    }
    const s = document.getElementById(cb + '_script'); if (s) s.remove();
    try { delete window[cb]; } catch (_) { window[cb] = undefined; }
  };
  const script = document.createElement('script');
  script.id = cb + '_script';
  script.src = SHEET_WEBAPP_URL + '?action=set&sheet=' + encodeURIComponent(SHEET_NAME) + '&rows=' + payload + '&callback=' + cb;
  document.head.appendChild(script);
  setTimeout(() => {
    if (window[cb]) {
      alert('Timeout beim Speichern.');
      const s = document.getElementById(cb + '_script'); if (s) s.remove();
      try { delete window[cb]; } catch (_) { window[cb] = undefined; }
    }
  }, 15000);
}
</script>
